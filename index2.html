<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
    /* Basic styling */
    .container-fluid {
        padding: 0;
    }

    .container-fluid>.row {
        display: flex;
        flex-wrap: nowrap;
        overflow-x: scroll;
        scroll-behavior: smooth;
    }

    .container-fluid > .row > .col-lg-4 {
        flex: 0 0 auto;
        width: 100%;
        margin-right: 10px;
        border-radius: 10px;
        border: 3px solid rgba(139, 215, 211, 0.317);
        height: fit-content;
    }

    .container-fluid > .row > .col-lg-4 img {
        width: 100%;
        height: auto;
    }

    .container-fluid > .row > .col-lg-4 .inner {
        padding: 15px;
    }

    .container-fluid > .row > .col-lg-4 .rrimg {
        display: grid;
        place-items: center;
    }

    @media (max-width: 760px) {
        .container-fluid > .row {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            padding: 10px;
        }

        .container-fluid > .row > .col-lg-4 {
            width: 90%; /* Give some space around each item */
            margin-right: 20px;
        }
    }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-lg-4">
                <div class="row rrimg"> 
                    <img src="cofee1.jpg" alt="">
                </div>
                <div class="container inner">
                    <h5><big><b>Coffee Shop Coffee</b></big></h5>
                    <br>
                    <h4><b>Up to $8</b></h4>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="row rrimg">
                    <img src="cofee2.jpg" alt="">
                </div>
                <div class="container inner">
                    <h5><b>Coffee Shop Coffee</b></h5>
                    <br>
                    <h4><b>As low as $1.40</b></h4>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="row rrimg"> 
                    <img src="cofee3.jpg" alt="">
                </div>
                <div class="container inner">
                    <h5><big><b>Protein shake</b></big></h5>
                    <br>
                    <h4><b>Up to $5</b></h4>
                </div>
            </div>
        </div>
    </div>

    <!-- Optional: Add navigation buttons -->
    <button class="slider-prev">Prev</button>
    <button class="slider-next">Next</button>

    <script>
    // Custom JavaScript to enable scrolling
    document.addEventListener("DOMContentLoaded", function() {
        const slider = document.querySelector('.container-fluid .row');
        const prevButton = document.querySelector('.slider-prev');
        const nextButton = document.querySelector('.slider-next');
        
        // Scroll functions
        function scrollSlider(offset) {
            slider.scrollBy({
                left: offset,
                behavior: 'smooth'
            });
        }

        // Add event listeners to buttons for scrolling
        prevButton.addEventListener('click', function() {
            scrollSlider(-300); // Scroll left
        });

        nextButton.addEventListener('click', function() {
            scrollSlider(300); // Scroll right
        });

        // Optional: Auto-slide every few seconds (for demonstration)
        setInterval(() => {
            scrollSlider(300);
        }, 5000);
    });
    </script>
</body>
</html>
